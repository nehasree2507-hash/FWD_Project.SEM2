<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack — Developer Details</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #18181b; height: 100vh; overflow: hidden; }

  /* TOPBAR */
  .topbar {
    background: #fff; border-bottom: 1px solid #e4e4e7;
    height: 60px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  .logo a { font-family: 'DM Serif Display', serif; font-size: 20px; text-decoration: none; color: #18181b; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .back-btn, .logout-btn {
    font-size: 13px; font-weight: 500; color: #18181b; background: none;
    border: 1px solid #e4e4e7; padding: 6px 14px; border-radius: 7px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; transition: background 0.15s;
  }
  .back-btn:hover, .logout-btn:hover { background: #f5f4f0; }

  /* LAYOUT — fixed height, no page scroll */
  .layout {
    display: flex;
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
  }

  /* SIDEBAR — always visible, scrollable internally */
  .sidebar {
    width: 250px; flex-shrink: 0;
    background: #fdf8ff; border-right: 1px solid #e8dff5;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 20px 20px 12px;
    border-bottom: 1px solid #e8dff5;
    flex-shrink: 0;
  }
  .sidebar-top-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: #a78bca; margin-bottom: 10px;
  }
  .add-dev-btn {
    width: 100%; padding: 8px 12px;
    background: #7c3aed; color: #fff;
    border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-dev-btn:hover { background: #6d28d9; }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 10px 0; }

  .dev-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px;
    cursor: pointer; border-left: 3px solid transparent;
    transition: background 0.15s, color 0.15s;
    font-size: 13px; font-weight: 500; color: #71717a;
    position: relative;
  }
  .dev-item:hover { background: #f0e9ff; color: #18181b; }
  .dev-item.active { background: #ede9fe; color: #5b21b6; border-left-color: #7c3aed; font-weight: 600; }
  .dev-av {
    width: 30px; height: 30px; border-radius: 8px; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .dev-item-name { flex: 1; }

  /* MAIN — scrollable */
  .main { flex: 1; overflow-y: auto; padding: 36px 48px; }

  /* DEV PROFILE HEADER */
  .dev-profile {
    display: flex; align-items: center; gap: 16px;
    background: #fdf4ff; border: 1px solid #e9d5ff;
    border-radius: 14px; padding: 20px 24px; margin-bottom: 28px;
  }
  .dev-av-lg {
    width: 52px; height: 52px; border-radius: 13px; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .dev-profile-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
  .dev-profile-role { font-size: 13px; color: #71717a; }
  .profile-actions { margin-left: auto; display: flex; gap: 8px; }

  .edit-btn {
    padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
    border: 1px solid #a78bfa; color: #5b21b6; background: #fff;
  }
  .edit-btn:hover { background: #ede9fe; }

  .delete-btn {
    padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
    border: 1px solid #fca5a5; color: #b91c1c; background: #fff;
  }
  .delete-btn:hover { background: #fee2e2; }

  /* CHIP */
  .chip { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .c-green { background: #dcfce7; color: #15803d; }
  .c-amber { background: #fef9c3; color: #b45309; }
  .c-red   { background: #fee2e2; color: #b91c1c; }
  .c-blue  { background: #dbeafe; color: #1d4ed8; }

  /* CATEGORY BLOCKS */
  .cat-block { margin-bottom: 26px; }
  .cat-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .cat-sub { font-size: 12px; color: #71717a; margin-bottom: 12px; padding: 0 4px; line-height: 1.5; }

  .cat-employee .cat-header { background: #ede9fe; color: #5b21b6; }
  .cat-tasks    .cat-header { background: #dcfce7; color: #166534; }
  .cat-output   .cat-header { background: #fef9c3; color: #854d0e; }
  .cat-time     .cat-header { background: #dbeafe; color: #1e40af; }
  .cat-quality  .cat-header { background: #fce7f3; color: #9d174d; }
  .cat-attend   .cat-header { background: #e0f2fe; color: #075985; }

  /* CARDS GRID */
  .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .info-card { background: #fff; border: 1px solid #e4e4e7; border-radius: 10px; padding: 14px 16px; }
  .info-card .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: #71717a; margin-bottom: 5px; }
  .info-card .val { font-size: 15px; font-weight: 600; color: #18181b; }

  .cat-employee .info-card { border-left: 3px solid #a78bfa; }
  .cat-tasks    .info-card { border-left: 3px solid #4ade80; }
  .cat-output   .info-card { border-left: 3px solid #fbbf24; }
  .cat-time     .info-card { border-left: 3px solid #60a5fa; }
  .cat-quality  .info-card { border-left: 3px solid #f472b6; }
  .cat-attend   .info-card { border-left: 3px solid #38bdf8; }

  /* TABLE */
  .tbl-wrap { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #71717a; background: #f9f7ff; border-bottom: 1px solid #e4e4e7; }
  tbody tr { border-bottom: 1px solid #e4e4e7; transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf9; }
  tbody td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff; border-radius: 16px;
    width: 520px; max-width: 95vw; max-height: 90vh;
    overflow-y: auto; padding: 32px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: #71717a; margin-bottom: 24px; }

  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-field { display: flex; flex-direction: column; gap: 5px; }
  .modal-field.full { grid-column: 1 / -1; }
  .modal-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #71717a; }
  .modal-field input, .modal-field select {
    padding: 10px 12px; border: 1px solid #e4e4e7; border-radius: 8px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; color: #18181b;
    background: #fafaf9; outline: none; transition: border-color 0.15s;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: #7c3aed; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    padding: 9px 18px; border: 1px solid #e4e4e7; border-radius: 8px;
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: none; cursor: pointer; color: #71717a; transition: background 0.15s;
  }
  .btn-cancel:hover { background: #f5f4f0; }
  .btn-save {
    padding: 9px 22px; background: #7c3aed; color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s;
  }
  .btn-save:hover { background: #6d28d9; }

  /* DELETE CONFIRM MODAL */
  .delete-modal { width: 400px; text-align: center; }
  .delete-icon { font-size: 44px; margin-bottom: 12px; }
  .delete-modal .modal-title { font-size: 20px; }
  .delete-modal .modal-sub { margin-bottom: 28px; }
  .btn-delete-confirm {
    padding: 9px 22px; background: #b91c1c; color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s;
  }
  .btn-delete-confirm:hover { background: #991b1b; }

  .fade-in { animation: fi 0.2s ease both; }
  @keyframes fi { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><a href="dashboard.html">DevTrack</a></div>
  <div class="topbar-right">
    <a class="back-btn" href="dashboard.html">← Dashboard</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR — always visible -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-top-label">Developers</div>
      <button class="add-dev-btn" onclick="openAddModal()">＋ Add Developer</button>
    </div>
    <div class="sidebar-list" id="devList"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">
    <div class="placeholder">
      <div class="pi" style="font-size:48px;opacity:0.15">👈</div>
      <h2 style="font-family:'DM Serif Display',serif;font-size:22px;color:#71717a;font-weight:400;margin-top:12px">Select a developer</h2>
      <p style="font-size:13px;color:#71717a;margin-top:6px">Pick a developer from the sidebar to see their full profile.</p>
    </div>
  </main>
</div>

<!-- EDIT / ADD MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Edit Developer</div>
    <div class="modal-sub" id="modalSub">Update this developer's information.</div>
    <div class="modal-grid">
      <div class="modal-field full">
        <label>Full Name</label>
        <input id="f-name" placeholder="e.g. Jane Smith">
      </div>
      <div class="modal-field">
        <label>Employee ID</label>
        <input id="f-id" placeholder="e.g. EMP-007">
      </div>
      <div class="modal-field">
        <label>Department</label>
        <input id="f-dept" placeholder="e.g. Engineering">
      </div>
      <div class="modal-field full">
        <label>Role</label>
        <input id="f-role" placeholder="e.g. Senior Frontend Engineer">
      </div>
      <div class="modal-field">
        <label>Status</label>
        <select id="f-status">
          <option value="Active">Active</option>
          <option value="Review">Review</option>
          <option value="Blocked">Blocked</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Avg Hours / Day</label>
        <input id="f-hoursDay" type="number" step="0.1" placeholder="e.g. 8.0">
      </div>
      <div class="modal-field">
        <label>Hours This Week</label>
        <input id="f-hoursWeek" type="number" placeholder="e.g. 40">
      </div>
      <div class="modal-field">
        <label>Days Present / 20</label>
        <input id="f-present" type="number" placeholder="e.g. 18">
      </div>
      <div class="modal-field">
        <label>Late Arrivals</label>
        <input id="f-late" type="number" placeholder="e.g. 1">
      </div>
      <div class="modal-field">
        <label>Meetings Attended</label>
        <input id="f-meetings" type="number" placeholder="e.g. 12">
      </div>
      <div class="modal-field">
        <label>Error Rate</label>
        <input id="f-errorRate" placeholder="e.g. 1.2%">
      </div>
      <div class="modal-field">
        <label>Client Feedback</label>
        <input id="f-feedback" placeholder="e.g. 4.7/5">
      </div>
      <div class="modal-field">
        <label>Peer Review Score</label>
        <input id="f-reviewScore" placeholder="e.g. 92/100">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn-save" onclick="saveEmployee()">Save Changes</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal delete-modal">
    <div class="delete-icon">🗑️</div>
    <div class="modal-title">Delete Developer?</div>
    <div class="modal-sub" id="deleteModalSub">This will permanently remove this developer.</div>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn-delete-confirm" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem('devtrack_loggedIn') || 'null');
  if (!user) window.location.href = 'login.html';
  function logout() { localStorage.removeItem('devtrack_loggedIn'); window.location.href = 'login.html'; }

  // ── DEFAULT DATA ──
  const defaultDevs = [
    { name:'Priya Sharma',  init:'PS', bg:'#dbeafe', tc:'#1e40af', id:'EMP-001', dept:'Engineering', role:'Senior Frontend Engineer', status:'Active',
      tasks:[{desc:'Auth token refresh on mobile',assigned:'Feb 24',due:'Mar 07',status:'In Progress'},{desc:'Dashboard CSV export feature',assigned:'Feb 26',due:'Mar 10',status:'Pending'},{desc:'Fix login redirect bug',assigned:'Feb 20',due:'Feb 28',status:'Completed'}],
      output:{reports:4,tickets:18,calls:7}, time:{hoursDay:8.2,hoursWeek:41,taskDuration:'3.5h avg'}, quality:{errorRate:'1.2%',feedback:'4.7/5',reviewScore:'92/100'}, attendance:{present:18,late:1,meetings:12}},
    { name:'Marcus Torres', init:'MT', bg:'#dcfce7', tc:'#166534', id:'EMP-002', dept:'Engineering', role:'Backend Engineer', status:'Active',
      tasks:[{desc:'Fix race condition in job queue',assigned:'Feb 22',due:'Mar 06',status:'In Progress'},{desc:'Update OpenAPI spec to v3',assigned:'Feb 28',due:'Mar 09',status:'In Progress'},{desc:'Database indexing optimization',assigned:'Feb 15',due:'Feb 25',status:'Completed'}],
      output:{reports:3,tickets:21,calls:5}, time:{hoursDay:8.0,hoursWeek:40,taskDuration:'4.1h avg'}, quality:{errorRate:'0.8%',feedback:'4.9/5',reviewScore:'96/100'}, attendance:{present:20,late:0,meetings:14}},
    { name:'Yuki Nakamura', init:'YN', bg:'#fef9c3', tc:'#854d0e', id:'EMP-003', dept:'Engineering', role:'Full Stack Developer', status:'Blocked',
      tasks:[{desc:'Pagination bug on filtered views',assigned:'Feb 25',due:'Mar 07',status:'Blocked'},{desc:'Notification service refactor',assigned:'Mar 01',due:'Mar 12',status:'Pending'},{desc:'Write unit tests for auth module',assigned:'Feb 18',due:'Feb 27',status:'Completed'}],
      output:{reports:2,tickets:14,calls:6}, time:{hoursDay:7.5,hoursWeek:37,taskDuration:'5.0h avg'}, quality:{errorRate:'2.4%',feedback:'4.2/5',reviewScore:'74/100'}, attendance:{present:17,late:3,meetings:10}},
    { name:'Arjun Kapoor',  init:'AK', bg:'#fce7f3', tc:'#9d174d', id:'EMP-004', dept:'DevOps', role:'DevOps Engineer', status:'Active',
      tasks:[{desc:'Provision staging env access',assigned:'Mar 01',due:'Mar 06',status:'In Progress'},{desc:'CI/CD pipeline fix',assigned:'Feb 26',due:'Mar 02',status:'Completed'},{desc:'Infra update to staging',assigned:'Feb 20',due:'Feb 28',status:'Completed'}],
      output:{reports:5,tickets:10,calls:9}, time:{hoursDay:8.5,hoursWeek:42,taskDuration:'3.0h avg'}, quality:{errorRate:'0.5%',feedback:'4.8/5',reviewScore:'90/100'}, attendance:{present:20,late:0,meetings:15}},
    { name:'Chloe Renard',  init:'CR', bg:'#ede9fe', tc:'#5b21b6', id:'EMP-005', dept:'Engineering', role:'Junior Frontend Engineer', status:'Review',
      tasks:[{desc:'Slack webhook front-end UI',assigned:'Mar 02',due:'Mar 10',status:'In Progress'},{desc:'Write test cases for auth flow',assigned:'Mar 01',due:'Mar 08',status:'Pending'},{desc:'Fix pagination on filtered view',assigned:'Feb 22',due:'Mar 05',status:'Completed'}],
      output:{reports:2,tickets:9,calls:4}, time:{hoursDay:7.0,hoursWeek:35,taskDuration:'4.8h avg'}, quality:{errorRate:'3.1%',feedback:'3.9/5',reviewScore:'66/100'}, attendance:{present:16,late:4,meetings:9}},
    { name:'Daniel Osei',   init:'DO', bg:'#fee2e2', tc:'#991b1b', id:'EMP-006', dept:'QA', role:'QA Engineer', status:'Active',
      tasks:[{desc:'Regression test auth module',assigned:'Mar 03',due:'Mar 07',status:'In Progress'},{desc:'Review Chloe PR DEV-105',assigned:'Mar 04',due:'Mar 06',status:'In Progress'},{desc:'QA test Slack webhook',assigned:'Feb 26',due:'Mar 04',status:'Completed'}],
      output:{reports:6,tickets:15,calls:8}, time:{hoursDay:8.0,hoursWeek:40,taskDuration:'2.8h avg'}, quality:{errorRate:'0.3%',feedback:'4.6/5',reviewScore:'88/100'}, attendance:{present:19,late:1,meetings:13}},
  ];

  // ── LOAD FROM LOCALSTORAGE (or use defaults) ──
  let devs = JSON.parse(localStorage.getItem('devtrack_devs') || 'null') || defaultDevs;

  function saveDevs() {
    localStorage.setItem('devtrack_devs', JSON.stringify(devs));
  }

  const avatarColors = [
    {bg:'#dbeafe',tc:'#1e40af'},{bg:'#dcfce7',tc:'#166534'},{bg:'#fef9c3',tc:'#854d0e'},
    {bg:'#fce7f3',tc:'#9d174d'},{bg:'#ede9fe',tc:'#5b21b6'},{bg:'#fee2e2',tc:'#991b1b'},
    {bg:'#e0f2fe',tc:'#075985'},{bg:'#fef3c7',tc:'#92400e'},{bg:'#f0fdf4',tc:'#15803d'},
  ];

  const sc = { 'Completed':'chip c-green','In Progress':'chip c-blue','Pending':'chip c-amber','Blocked':'chip c-red','Active':'chip c-green','Review':'chip c-amber' };

  let currentDev = 0;
  let editingIndex = null;

  // ── BUILD SIDEBAR ──
  function buildSidebar() {
    const list = document.getElementById('devList');
    list.innerHTML = '';
    devs.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'dev-item' + (i === currentDev ? ' active' : '');
      el.innerHTML = `
        <div class="dev-av" style="background:${d.bg};color:${d.tc}">${d.init}</div>
        <div class="dev-item-name">${d.name}</div>`;
      el.onclick = () => { currentDev = i; buildSidebar(); render(); };
      list.appendChild(el);
    });
  }

  // ── RENDER MAIN ──
  function card(lbl, val) {
    return `<div class="info-card"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
  }

  function render() {
    const d = devs[currentDev];
    document.getElementById('mainContent').innerHTML = `
      <div class="dev-profile fade-in">
        <div class="dev-av-lg" style="background:${d.bg};color:${d.tc}">${d.init}</div>
        <div>
          <div class="dev-profile-name">${d.name}</div>
          <div class="dev-profile-role">${d.role} · ${d.dept}</div>
        </div>
        <div class="profile-actions">
          <button class="edit-btn" onclick="openEditModal(${currentDev})">✏️ Edit</button>
          <button class="delete-btn" onclick="openDeleteModal(${currentDev})">🗑️ Delete</button>
        </div>
      </div>

      <div class="cat-block cat-employee fade-in">
        <div class="cat-header">👤 Employee Info</div>
        <div class="cat-sub">Basic identification — who this developer is, their role, and current sprint status.</div>
        <div class="cards-grid">
          ${card('Full Name', d.name)}
          ${card('Employee ID', d.id)}
          ${card('Department', d.dept)}
          ${card('Role', d.role)}
          ${card('Sprint', 'Sprint 24')}
          ${card('Status', `<span class="${sc[d.status]}">${d.status}</span>`)}
        </div>
      </div>

      <div class="cat-block cat-tasks fade-in">
        <div class="cat-header">✅ Tasks & Projects</div>
        <div class="cat-sub">All tasks assigned this sprint — what they're working on, when it's due, and where it stands.</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Task</th><th>Assigned</th><th>Due</th><th>Status</th></tr></thead>
          <tbody>${d.tasks.map(t=>`<tr><td>${t.desc}</td><td style="color:#71717a">${t.assigned}</td><td style="color:#71717a">${t.due}</td><td><span class="${sc[t.status]}">${t.status}</span></td></tr>`).join('')}</tbody>
        </table></div>
      </div>

      <div class="cat-block cat-output fade-in">
        <div class="cat-header">📦 Output & Deliverables</div>
        <div class="cat-sub">Tangible work produced this sprint — reports filed, tickets closed, and task completion rate.</div>
        <div class="cards-grid">
          ${card('Reports Submitted', d.output.reports)}
          ${card('Tickets Resolved', d.output.tickets)}
          ${card('Client Calls', d.output.calls)}
          ${card('Tasks Completed', `${d.tasks.filter(t=>t.status==='Completed').length} / ${d.tasks.length}`)}
        </div>
      </div>

      <div class="cat-block cat-time fade-in">
        <div class="cat-header">⏱️ Time Metrics</div>
        <div class="cat-sub">How this developer spends their time — daily hours, weekly total, and average task duration.</div>
        <div class="cards-grid">
          ${card('Avg Hours / Day', d.time.hoursDay + 'h')}
          ${card('Hours This Week', d.time.hoursWeek + 'h')}
          ${card('Avg Task Duration', d.time.taskDuration)}
          ${card('In Progress', d.tasks.filter(t=>t.status==='In Progress').length + ' tasks')}
        </div>
      </div>

      <div class="cat-block cat-quality fade-in">
        <div class="cat-header">🔍 Quality Check</div>
        <div class="cat-sub">Accuracy and quality of work — error rate, client ratings, and peer review scores.</div>
        <div class="cards-grid">
          ${card('Error Rate', d.quality.errorRate)}
          ${card('Client Feedback', d.quality.feedback)}
          ${card('Peer Review Score', d.quality.reviewScore)}
        </div>
      </div>

      <div class="cat-block cat-attend fade-in">
        <div class="cat-header">📅 Attendance & Engagement</div>
        <div class="cat-sub">Presence and participation — days in office, late arrivals, and meetings attended.</div>
        <div class="cards-grid">
          ${card('Days Present', `${d.attendance.present} / 20`)}
          ${card('Late Arrivals', `<span style="color:${d.attendance.late>2?'#b91c1c':'#18181b'}">${d.attendance.late}</span>`)}
          ${card('Meetings Attended', d.attendance.meetings)}
        </div>
      </div>`;
  }

  // ── EDIT MODAL ──
  function openEditModal(i) {
    editingIndex = i;
    const d = devs[i];
    document.getElementById('modalTitle').textContent = 'Edit Developer';
    document.getElementById('modalSub').textContent = `Editing ${d.name}'s information.`;
    document.getElementById('f-name').value = d.name;
    document.getElementById('f-id').value = d.id;
    document.getElementById('f-dept').value = d.dept;
    document.getElementById('f-role').value = d.role;
    document.getElementById('f-status').value = d.status;
    document.getElementById('f-hoursDay').value = d.time.hoursDay;
    document.getElementById('f-hoursWeek').value = d.time.hoursWeek;
    document.getElementById('f-present').value = d.attendance.present;
    document.getElementById('f-late').value = d.attendance.late;
    document.getElementById('f-meetings').value = d.attendance.meetings;
    document.getElementById('f-errorRate').value = d.quality.errorRate;
    document.getElementById('f-feedback').value = d.quality.feedback;
    document.getElementById('f-reviewScore').value = d.quality.reviewScore;
    document.getElementById('editModal').classList.add('open');
  }

  // ── ADD MODAL ──
  function openAddModal() {
    editingIndex = null;
    document.getElementById('modalTitle').textContent = 'Add Developer';
    document.getElementById('modalSub').textContent = 'Fill in the details for the new developer.';
    document.querySelectorAll('#editModal input, #editModal select').forEach(el => { if (el.tagName === 'SELECT') el.value = 'Active'; else el.value = ''; });
    document.getElementById('editModal').classList.add('open');
  }

  function saveEmployee() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Name is required.'); return; }

    const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const colorSet = avatarColors[editingIndex !== null ? editingIndex % avatarColors.length : devs.length % avatarColors.length];

    const updated = {
      name,
      init: initials,
      bg: editingIndex !== null ? devs[editingIndex].bg : colorSet.bg,
      tc: editingIndex !== null ? devs[editingIndex].tc : colorSet.tc,
      id:   document.getElementById('f-id').value.trim() || 'EMP-00X',
      dept: document.getElementById('f-dept').value.trim() || 'Engineering',
      role: document.getElementById('f-role').value.trim() || 'Developer',
      status: document.getElementById('f-status').value,
      tasks: editingIndex !== null ? devs[editingIndex].tasks : [],
      output: editingIndex !== null ? devs[editingIndex].output : {reports:0,tickets:0,calls:0},
      time: {
        hoursDay: parseFloat(document.getElementById('f-hoursDay').value) || 8,
        hoursWeek: parseInt(document.getElementById('f-hoursWeek').value) || 40,
        taskDuration: editingIndex !== null ? devs[editingIndex].time.taskDuration : '—'
      },
      quality: {
        errorRate:   document.getElementById('f-errorRate').value.trim() || '—',
        feedback:    document.getElementById('f-feedback').value.trim() || '—',
        reviewScore: document.getElementById('f-reviewScore').value.trim() || '—'
      },
      attendance: {
        present:  parseInt(document.getElementById('f-present').value) || 0,
        late:     parseInt(document.getElementById('f-late').value) || 0,
        meetings: parseInt(document.getElementById('f-meetings').value) || 0
      }
    };

    if (editingIndex !== null) {
      devs[editingIndex] = updated;
    } else {
      devs.push(updated);
      currentDev = devs.length - 1;
    }

    saveDevs();
    closeModals();
    buildSidebar();
    render();
  }

  // ── DELETE MODAL ──
  function openDeleteModal(i) {
    editingIndex = i;
    document.getElementById('deleteModalSub').textContent = `This will permanently remove ${devs[i].name} from the list.`;
    document.getElementById('deleteModal').classList.add('open');
  }

  function confirmDelete() {
    devs.splice(editingIndex, 1);
    currentDev = Math.min(currentDev, devs.length - 1);
    saveDevs();
    closeModals();
    buildSidebar();
    if (devs.length > 0) render();
    else document.getElementById('mainContent').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;text-align:center">
        <div style="font-size:48px;opacity:0.15">👥</div>
        <h2 style="font-family:'DM Serif Display',serif;font-size:22px;color:#71717a;font-weight:400">No developers yet</h2>
        <p style="font-size:13px;color:#71717a">Click "+ Add Developer" to get started.</p>
      </div>`;
  }

  function closeModals() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
  }

  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModals(); });
  });

  // ── INIT ──
  buildSidebar();
  render();
</script>
</body>
</html>
