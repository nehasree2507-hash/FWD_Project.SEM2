<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack — Developer Details</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #18181b; }

  /* TOPBAR */
  .topbar {
    background: #fff; border-bottom: 1px solid #e4e4e7;
    min-height: 60px; height: auto; display: flex; align-items: center; justify-content: space-between;
    padding: 8px 48px; position: sticky; top: 0; z-index: 50;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .top-right-stack { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .top-action-row  { display: flex; gap: 6px; }  .action-btns { display:flex; gap:10px; margin-top:14px; }
  .btn-edit {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: #1d4ed8; color: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-edit:hover { background: #1e40af; }
  .btn-delete {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: #dc2626; color: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-delete:hover { background: #b91c1c; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 28px 30px;
    width: 480px; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h3 { margin: 0 0 18px; font-size: 17px; color: #18181b; }
  .modal label { display: block; font-size: 12px; color: #71717a; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select {
    width: 100%; padding: 8px 10px; border: 1px solid #e4e4e7;
    border-radius: 7px; font-size: 13px; box-sizing: border-box;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-save {
    padding: 8px 22px; background: #1d4ed8; color: #fff;
    border: none; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-cancel {
    padding: 8px 22px; background: #f4f4f5; color: #18181b;
    border: none; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }

  .back-btn, .logout-btn {
    font-size: 13px; font-weight: 500; color: #18181b; background: none;
    border: 1px solid #e4e4e7; padding: 6px 14px; border-radius: 7px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; transition: background 0.15s;
  }
  .back-btn:hover, .logout-btn:hover { background: #f5f4f0; }

  .btn-edit-top {
    padding: 7px 16px; border-radius: 8px; border: none;
    background: #dbeafe; color: #1d4ed8; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-edit-top:hover { background: #bfdbfe; }
  .btn-delete-top {
    padding: 7px 16px; border-radius: 8px; border: none;
    background: #fee2e2; color: #dc2626; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .btn-delete-top:hover { background: #fecaca; }

  .top-right-stack { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .top-action-row  { display: flex; gap: 8px; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: #fdf8ff; border-right: 1px solid #e8dff5;
    padding: 28px 0; position: sticky; top: 60px;
    height: calc(100vh - 60px); overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
    color: #a78bca; padding: 0 20px; margin-bottom: 8px;
  }
  .dev-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px;
    cursor: pointer; border-left: 3px solid transparent;
    transition: background 0.15s, color 0.15s;
    font-size: 13px; font-weight: 500; color: #71717a;
  }
  .dev-item:hover { background: #f0e9ff; color: #18181b; }
  .dev-item.active { background: #ede9fe; color: #5b21b6; border-left-color: #7c3aed; font-weight: 600; }

  .dev-item-wrap { position: relative; display: flex; align-items: center; }
  .dev-item-wrap .dev-item { flex: 1; }
  .dev-item-actions { display: none; gap: 4px; padding-right: 6px; }
  .dev-item-wrap:hover .dev-item-actions { display: flex; }
  .btn-sm-edit, .btn-sm-del {
    font-size: 11px; border: none; border-radius: 4px;
    padding: 3px 6px; cursor: pointer; font-weight: 600;
  }
  .btn-sm-edit { background: #dbeafe; color: #1d4ed8; }
  .btn-sm-edit:hover { background: #bfdbfe; }
  .btn-sm-del  { background: #fee2e2; color: #dc2626; }
  .btn-sm-del:hover  { background: #fecaca; }

  .add-dev-btn {
    width: calc(100% - 20px); margin: 10px; padding: 9px;
    background: #7c3aed; color: #fff; border: none;
    border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: block;
  }
  .add-dev-btn:hover { background: #6d28d9; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 28px 30px;
    width: 460px; max-height: 88vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h3 { margin: 0 0 16px; font-size: 17px; color: #18181b; }
  .modal label { display: block; font-size: 12px; color: #71717a; margin: 10px 0 3px; }
  .modal input, .modal select {
    width: 100%; padding: 8px 10px; border: 1px solid #e4e4e7;
    border-radius: 7px; font-size: 13px; box-sizing: border-box;
  }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-save   { padding: 8px 22px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-cancel { padding: 8px 22px; background: #f4f4f5; color: #18181b; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .dev-av {
    width: 30px; height: 30px; border-radius: 8px; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* MAIN */
  .main { flex: 1; padding: 40px 48px; overflow-y: auto; }

  /* PLACEHOLDER */
  .placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; text-align: center; gap: 12px;
  }
  .placeholder .pi { font-size: 48px; opacity: 0.15; }
  .placeholder h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: #71717a; font-weight: 400; }
  .placeholder p { font-size: 13px; color: #71717a; }

  /* DEV PROFILE HEADER */
  .dev-profile {
    display: flex; align-items: center; gap: 16px;
    background: #fdf4ff; border: 1px solid #e9d5ff;
    border-radius: 14px; padding: 20px 24px; margin-bottom: 32px;
  }
  .dev-av-lg {
    width: 52px; height: 52px; border-radius: 13px; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .dev-profile-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
  .dev-profile-role { font-size: 13px; color: #71717a; }
  .status-badge { margin-left: auto; }

  /* CHIP */
  .chip { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .c-green { background: #dcfce7; color: #15803d; }
  .c-amber { background: #fef9c3; color: #b45309; }
  .c-red   { background: #fee2e2; color: #b91c1c; }
  .c-blue  { background: #dbeafe; color: #1d4ed8; }

  /* CATEGORY BLOCK */
  .cat-block {
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e4e4e7;
  }

  .sections-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 28px 0;
    align-items: stretch;
  }

  .cat-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .cat-sub {
    font-size: 12px; color: #71717a;
    margin-bottom: 12px; padding: 0 4px;
    line-height: 1.5;
  }

  .cat-employee .cat-header { background: #ede9fe; color: #5b21b6; }
  .cat-tasks    .cat-header { background: #dcfce7; color: #166534; }
  .cat-output   .cat-header { background: #fef9c3; color: #854d0e; }
  .cat-time     .cat-header { background: #dbeafe; color: #1e40af; }
  .cat-quality  .cat-header { background: #fce7f3; color: #9d174d; }
  .cat-attend   .cat-header { background: #e0f2fe; color: #075985; }

  /* COMPACT CARDS GRID — 2 columns */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .info-card {
    background: #fff; border: 1px solid #e4e4e7;
    border-radius: 10px; padding: 14px 16px;
  }
  .info-card .lbl {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.9px; color: #71717a; margin-bottom: 5px;
  }
  .info-card .val { font-size: 15px; font-weight: 600; color: #18181b; }

  /* Colored left accent per category */
  .cat-employee .info-card { border-left: 3px solid #a78bfa; }
  .cat-tasks    .info-card { border-left: 3px solid #4ade80; }
  .cat-output   .info-card { border-left: 3px solid #fbbf24; }
  .cat-time     .info-card { border-left: 3px solid #60a5fa; }
  .cat-quality  .info-card { border-left: 3px solid #f472b6; }
  .cat-attend   .info-card { border-left: 3px solid #38bdf8; }

  /* TABLE */
  .tbl-wrap { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #71717a; background: #f9f7ff; border-bottom: 1px solid #e4e4e7; }
  tbody tr { border-bottom: 1px solid #e4e4e7; transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf9; }
  tbody td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }

  .fade-in { animation: fi 0.22s ease both; }
  @keyframes fi { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 900px) {
    .sidebar { width: 200px; } .main { padding: 24px 20px; } .topbar { padding: 0 20px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><a href="dashboard.html" style="text-decoration:none;color:inherit">DevTrack</a></div>
  <div class="topbar-right">
    <a class="back-btn" href="dashboard.html">← Dashboard</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-label">Developers</div>
    <div id="devList"></div>
    <button class="add-dev-btn" onclick="openAddModal()">+ Add Developer</button>
  </aside>

  <main class="main" id="mainContent">
    <div class="placeholder">
      <div class="pi">👈</div>
      <h2>Select a developer</h2>
      <p>Pick a developer from the sidebar to see their full profile.</p>
    </div>
  </main>
</div>

<script>
  const user = JSON.parse(localStorage.getItem('devtrack_loggedIn') || 'null');
  if (!user) window.location.href = 'login.html';
  function logout() { localStorage.removeItem('devtrack_loggedIn'); window.location.href = 'login.html'; }

  const defaultDevs = [
    { name:'P VENKATA RAMANA',  init:'PV', bg:'#dbeafe', tc:'#1e40af', id:'EMP-001', dept:'Engineering', role:'Senior Frontend Engineer', status:'Active',
      tasks:[{desc:'Auth token refresh on mobile',assigned:'Feb 24',due:'Mar 07',status:'In Progress'},{desc:'Dashboard CSV export feature',assigned:'Feb 26',due:'Mar 10',status:'Pending'},{desc:'Fix login redirect bug',assigned:'Feb 20',due:'Feb 28',status:'Completed'}],
      output:{reports:4,tickets:18,calls:7}, time:{hoursDay:8.2,hoursWeek:41,taskDuration:'3.5h avg'}, quality:{errorRate:'1.2%',feedback:'4.7/5',reviewScore:'92/100'}, attendance:{present:18,late:1,meetings:12}},
    { name:'P VENU GOPAL', init:'PV', bg:'#dcfce7', tc:'#166534', id:'EMP-002', dept:'Engineering', role:'Backend Engineer', status:'Active',
      tasks:[{desc:'Fix race condition in job queue',assigned:'Feb 22',due:'Mar 06',status:'In Progress'},{desc:'Update OpenAPI spec to v3',assigned:'Feb 28',due:'Mar 09',status:'In Progress'},{desc:'Database indexing optimization',assigned:'Feb 15',due:'Feb 25',status:'Completed'}],
      output:{reports:3,tickets:21,calls:5}, time:{hoursDay:8.0,hoursWeek:40,taskDuration:'4.1h avg'}, quality:{errorRate:'0.8%',feedback:'4.9/5',reviewScore:'96/100'}, attendance:{present:20,late:0,meetings:14}},
    { name:'P SWATHI', init:'PS', bg:'#fef9c3', tc:'#854d0e', id:'EMP-003', dept:'Engineering', role:'Full Stack Developer', status:'Blocked',
      tasks:[{desc:'Pagination bug on filtered views',assigned:'Feb 25',due:'Mar 07',status:'Blocked'},{desc:'Notification service refactor',assigned:'Mar 01',due:'Mar 12',status:'Pending'},{desc:'Write unit tests for auth module',assigned:'Feb 18',due:'Feb 27',status:'Completed'}],
      output:{reports:2,tickets:14,calls:6}, time:{hoursDay:7.5,hoursWeek:37,taskDuration:'5.0h avg'}, quality:{errorRate:'2.4%',feedback:'4.2/5',reviewScore:'74/100'}, attendance:{present:17,late:3,meetings:10}},
    { name:'A JAHNAVI',  init:'AJ', bg:'#fce7f3', tc:'#9d174d', id:'EMP-004', dept:'DevOps', role:'DevOps Engineer', status:'Active',
      tasks:[{desc:'Provision staging env access',assigned:'Mar 01',due:'Mar 06',status:'In Progress'},{desc:'CI/CD pipeline fix',assigned:'Feb 26',due:'Mar 02',status:'Completed'},{desc:'Infra update to staging',assigned:'Feb 20',due:'Feb 28',status:'Completed'}],
      output:{reports:5,tickets:10,calls:9}, time:{hoursDay:8.5,hoursWeek:42,taskDuration:'3.0h avg'}, quality:{errorRate:'0.5%',feedback:'4.8/5',reviewScore:'90/100'}, attendance:{present:20,late:0,meetings:15}},
    { name:'B PRAVEEN',  init:'BP', bg:'#ede9fe', tc:'#5b21b6', id:'EMP-005', dept:'Engineering', role:'Junior Frontend Engineer', status:'Review',
      tasks:[{desc:'Slack webhook front-end UI',assigned:'Mar 02',due:'Mar 10',status:'In Progress'},{desc:'Write test cases for auth flow',assigned:'Mar 01',due:'Mar 08',status:'Pending'},{desc:'Fix pagination on filtered view',assigned:'Feb 22',due:'Mar 05',status:'Completed'}],
      output:{reports:2,tickets:9,calls:4}, time:{hoursDay:7.0,hoursWeek:35,taskDuration:'4.8h avg'}, quality:{errorRate:'3.1%',feedback:'3.9/5',reviewScore:'66/100'}, attendance:{present:16,late:4,meetings:9}},
    { name:'ABHAY KUMAR',   init:'AK', bg:'#fee2e2', tc:'#991b1b', id:'EMP-006', dept:'QA', role:'QA Engineer', status:'Active',
      tasks:[{desc:'Regression test auth module',assigned:'Mar 03',due:'Mar 07',status:'In Progress'},{desc:'Review BPB PR DEV-105',assigned:'Mar 04',due:'Mar 06',status:'In Progress'},{desc:'QA test Slack webhook',assigned:'Feb 26',due:'Mar 04',status:'Completed'}],
      output:{reports:6,tickets:15,calls:8}, time:{hoursDay:8.0,hoursWeek:40,taskDuration:'2.8h avg'}, quality:{errorRate:'0.3%',feedback:'4.6/5',reviewScore:'88/100'}, attendance:{present:19,late:1,meetings:13}},
  ];

  // Always load from localStorage — if nothing saved yet, use default and save it
  if (!localStorage.getItem('devtrack_devs')) {
    localStorage.setItem('devtrack_devs', JSON.stringify(defaultDevs));
  }
  var devs = JSON.parse(localStorage.getItem('devtrack_devs'));

  function saveDevs() {
    localStorage.setItem('devtrack_devs', JSON.stringify(devs));
  }

  const sc = { 'Completed':'chip c-green','In Progress':'chip c-blue','Pending':'chip c-amber','Blocked':'chip c-red','Active':'chip c-green','Review':'chip c-amber' };

  let currentDev = null;

  function buildSidebar() {
    const devList = document.getElementById('devList');
    devList.innerHTML = '';
    devs.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'dev-item' + (i === currentDev ? ' active' : '');
      el.innerHTML = `<div class="dev-av" style="background:${d.bg};color:${d.tc}">${d.init}</div>${d.name}`;
      el.onclick = () => { currentDev = i; buildSidebar(); render(); };
      devList.appendChild(el);
    });
  }

  buildSidebar();
  currentDev = 0;
  buildSidebar();
  render();

  function card(lbl, val) {
    return `<div class="info-card"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
  }

  function render() {
    const d = devs[currentDev];
    document.getElementById('mainContent').innerHTML = `

      <div class="dev-profile fade-in">
        <div class="dev-av-lg" style="background:${d.bg};color:${d.tc}">${d.init}</div>
        <div>
          <div class="dev-profile-name">${d.name}</div>
          <div class="dev-profile-role">${d.role} · ${d.dept}</div>
        </div>
        <span class="${sc[d.status]} status-badge">${d.status}</span>
        <button class="btn-edit-top" onclick="openEdit(currentDev)">✏️ Edit</button>
        <button class="btn-delete-top" onclick="deleteDev(currentDev)">🗑️ Delete</button>
      </div>

      <div class="sections-grid">

        <div class="cat-block cat-employee fade-in">
          <div class="cat-header">👤 Employee Info</div>
          <div class="cat-sub">Basic identification details — who this developer is, their role, and current sprint status.</div>
          <div class="cards-grid">
            ${card('Full Name', d.name)}
            ${card('Employee ID', d.id)}
            ${card('Department', d.dept)}
            ${card('Role', d.role)}
            ${card('Sprint', 'Sprint 24')}
            ${card('Status', `<span class="${sc[d.status]}">${d.status}</span>`)}
          </div>
        </div>

        <div class="cat-block cat-tasks fade-in">
          <div class="cat-header">✅ Tasks & Projects</div>
          <div class="cat-sub">All tasks assigned to this developer this sprint — what they're working on, when it's due, and where it stands.</div>
          <div class="tbl-wrap"><table>
            <thead><tr><th>Task</th><th>Assigned</th><th>Due</th><th>Status</th></tr></thead>
            <tbody>${d.tasks.map(t=>`<tr><td>${t.desc}</td><td style="color:#71717a">${t.assigned}</td><td style="color:#71717a">${t.due}</td><td><span class="${sc[t.status]}">${t.status}</span></td></tr>`).join('')}</tbody>
          </table></div>
        </div>

        <div class="cat-block cat-output fade-in">
          <div class="cat-header">📦 Output & Deliverables</div>
          <div class="cat-sub">Tangible work produced this sprint — reports filed, tickets closed, client calls handled, and overall task completion.</div>
          <div class="cards-grid">
            ${card('Reports Submitted', d.output.reports)}
            ${card('Tickets Resolved', d.output.tickets)}
            ${card('Client Calls', d.output.calls)}
            ${card('Tasks Completed', `${d.tasks.filter(t=>t.status==='Completed').length} / ${d.tasks.length}`)}
          </div>
        </div>

        <div class="cat-block cat-time fade-in">
          <div class="cat-header">⏱️ Time Metrics</div>
          <div class="cat-sub">How this developer is spending their time — daily hours logged, weekly total, and how long tasks typically take.</div>
          <div class="cards-grid">
            ${card('Avg Hours / Day', d.time.hoursDay + 'h')}
            ${card('Hours This Week', d.time.hoursWeek + 'h')}
            ${card('Avg Task Duration', d.time.taskDuration)}
            ${card('In Progress', d.tasks.filter(t=>t.status==='In Progress').length + ' tasks')}
          </div>
        </div>

        <div class="cat-block cat-quality fade-in">
          <div class="cat-header">🔍 Quality Check</div>
          <div class="cat-sub">Measures the accuracy and quality of work — error rate, how clients rate the output, and peer review scores.</div>
          <div class="cards-grid">
            ${card('Error Rate', d.quality.errorRate)}
            ${card('Client Feedback', d.quality.feedback)}
            ${card('Peer Review Score', d.quality.reviewScore)}
          </div>
        </div>

        <div class="cat-block cat-attend fade-in">
          <div class="cat-header">📅 Attendance & Engagement</div>
          <div class="cat-sub">Tracks presence and participation — days in office, late arrivals, and meetings attended this sprint.</div>
          <div class="cards-grid">
            ${card('Days Present', `${d.attendance.present} / 20`)}
            ${card('Late Arrivals', `<span style="color:${d.attendance.late>2?'#b91c1c':'#18181b'}">${d.attendance.late}</span>`)}
            ${card('Meetings Attended', d.attendance.meetings)}
          </div>
        </div>

      </div>
    `;
  }

</script>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Developer</h3>
    <div class="modal-row">
      <div><label>Full Name</label><input id="e_name" type="text"></div>
      <div><label>Employee ID</label><input id="e_id" type="text"></div>
    </div>
    <div class="modal-row">
      <div><label>Department</label><input id="e_dept" type="text"></div>
      <div><label>Role</label><input id="e_role" type="text"></div>
    </div>
    <label>Status</label>
    <select id="e_status">
      <option>Active</option><option>Review</option><option>Blocked</option>
    </select>
    <div class="modal-row">
      <div><label>Hours / Day</label><input id="e_hday" type="number" step="0.1"></div>
      <div><label>Hours / Week</label><input id="e_hweek" type="number" step="0.1"></div>
    </div>
    <div class="modal-row">
      <div><label>Error Rate (%)</label><input id="e_err" type="number" step="0.1"></div>
      <div><label>Review Score (0–5)</label><input id="e_score" type="number" step="0.1" min="0" max="5"></div>
    </div>
    <div class="modal-row">
      <div><label>Days Present</label><input id="e_present" type="number"></div>
      <div><label>Late Arrivals</label><input id="e_late" type="number"></div>
    </div>
    <label>Meetings Attended</label>
    <input id="e_meetings" type="number">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Add Developer Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>➕ Add New Developer</h3>
    <div class="modal-row">
      <div><label>Full Name</label><input id="a_name" type="text" placeholder="e.g. R KUMAR"></div>
      <div><label>Employee ID</label><input id="a_id" type="text" placeholder="e.g. EMP-007"></div>
    </div>
    <div class="modal-row">
      <div><label>Department</label><input id="a_dept" type="text" placeholder="Engineering"></div>
      <div><label>Role</label><input id="a_role" type="text" placeholder="Frontend Developer"></div>
    </div>
    <label>Status</label>
    <select id="a_status">
      <option>Active</option><option>Review</option><option>Blocked</option>
    </select>
    <div class="modal-row">
      <div><label>Hours / Day</label><input id="a_hday" type="number" step="0.1" value="8"></div>
      <div><label>Hours / Week</label><input id="a_hweek" type="number" step="0.1" value="40"></div>
    </div>
    <div class="modal-row">
      <div><label>Error Rate (%)</label><input id="a_err" type="number" step="0.1" value="1.0"></div>
      <div><label>Review Score (0–5)</label><input id="a_score" type="number" step="0.1" min="0" max="5" value="4.0"></div>
    </div>
    <div class="modal-row">
      <div><label>Days Present</label><input id="a_present" type="number" value="20"></div>
      <div><label>Late Arrivals</label><input id="a_late" type="number" value="0"></div>
    </div>
    <label>Meetings Attended</label>
    <input id="a_meetings" type="number" value="10">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-save" onclick="saveDev()">Add Developer</button>
    </div>
  </div>
</div>

<script>
  const scMap   = { Active: 'sp-active', Review: 'sp-review', Blocked: 'sp-blocked' };
  const bgPool  = ['#dbeafe','#dcfce7','#fef9c3','#fce7f3','#ede9fe','#fee2e2','#e0f2fe','#fef3c7'];
  const tcPool  = ['#1e40af','#166534','#854d0e','#9d174d','#5b21b6','#991b1b','#0369a1','#92400e'];

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function openEdit(i) {
    const d = devs[i];
    currentDev = i;
    document.getElementById('e_name').value     = d.name;
    document.getElementById('e_id').value       = d.id;
    document.getElementById('e_dept').value     = d.dept;
    document.getElementById('e_role').value     = d.role;
    document.getElementById('e_status').value   = d.status;
    document.getElementById('e_hday').value     = d.time.hoursDay;
    document.getElementById('e_hweek').value    = d.time.hoursWeek;
    document.getElementById('e_err').value      = parseFloat(d.quality.errorRate);
    document.getElementById('e_score').value    = parseFloat(d.quality.reviewScore);
    document.getElementById('e_present').value  = d.attendance.present;
    document.getElementById('e_late').value     = d.attendance.late;
    document.getElementById('e_meetings').value = d.attendance.meetings;
    document.getElementById('editModal').classList.add('open');
  }

  function saveEdit() {
    const d = devs[currentDev];
    const newStatus = document.getElementById('e_status').value;
    d.name                = document.getElementById('e_name').value;
    d.id                  = document.getElementById('e_id').value;
    d.dept                = document.getElementById('e_dept').value;
    d.role                = document.getElementById('e_role').value;
    d.status              = newStatus;
    d.sc                  = scMap[newStatus];
    d.init                = d.name.split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase();
    d.time.hoursDay       = parseFloat(document.getElementById('e_hday').value);
    d.time.hoursWeek      = parseFloat(document.getElementById('e_hweek').value);
    d.quality.errorRate   = document.getElementById('e_err').value + '%';
    d.quality.reviewScore = document.getElementById('e_score').value + '/5';
    d.attendance.present  = parseInt(document.getElementById('e_present').value);
    d.attendance.late     = parseInt(document.getElementById('e_late').value);
    d.attendance.meetings = parseInt(document.getElementById('e_meetings').value);
    closeModal('editModal');
    saveDevs();
    buildSidebar();
    render();
  }

  function deleteDev(i) {
    if (!confirm(`Delete ${devs[i].name}?`)) return;
    devs.splice(i, 1);
    currentDev = devs.length > 0 ? 0 : null;
    saveDevs();
    buildSidebar();
    if (currentDev !== null) render();
    else document.getElementById('mainContent').innerHTML = '<p style="padding:20px;color:#71717a">No developers found.</p>';
  }

  function openAddModal() {
    document.getElementById('addModal').classList.add('open');
  }

  function saveDev() {
    const name   = document.getElementById('a_name').value.trim();
    const id     = document.getElementById('a_id').value.trim();
    if (!name || !id) { alert('Name and ID are required!'); return; }
    const status = document.getElementById('a_status').value;
    const idx    = devs.length % bgPool.length;
    const newDev = {
      name, id,
      dept:   document.getElementById('a_dept').value || 'Engineering',
      role:   document.getElementById('a_role').value || 'Developer',
      status, sc: scMap[status],
      init:   name.split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase(),
      bg: bgPool[idx], tc: tcPool[idx],
      time: {
        hoursDay:     parseFloat(document.getElementById('a_hday').value)  || 8,
        hoursWeek:    parseFloat(document.getElementById('a_hweek').value) || 40,
        taskDuration: '2-3 days'
      },
      quality: {
        errorRate:   (document.getElementById('a_err').value   || '1.0') + '%',
        feedback:    '4.0/5',
        reviewScore: (document.getElementById('a_score').value || '4.0') + '/5',
        score: Math.round(parseFloat(document.getElementById('a_score').value || 4) * 20)
      },
      attendance: {
        present:  parseInt(document.getElementById('a_present').value)  || 20,
        late:     parseInt(document.getElementById('a_late').value)     || 0,
        meetings: parseInt(document.getElementById('a_meetings').value) || 10
      },
      output: { reports: 5, tickets: 10, calls: 3 },
      tasks: [{ desc: 'Onboarding task', assigned: 'Today', due: 'TBD', status: 'In Progress' }]
    };
    devs.push(newDev);
    currentDev = devs.length - 1;
    closeModal('addModal');
    saveDevs();
    buildSidebar();
    render();
  }

  // Close on outside click
  ['editModal','addModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) closeModal(id);
    });
  });
</script>
</body>
</html>
