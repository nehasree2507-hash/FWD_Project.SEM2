<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --white: #ffffff;
    --text: #18181b;
    --muted: #71717a;
    --border: #e4e4e7;
    --accent: #18181b;
    --accent-hover: #3f3f46;
    --error: #dc2626;
    --success: #16a34a;
    --input-bg: #fafaf9;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: stretch;
  }

  /* LEFT PANEL — Image */
  .left-panel {
    flex: 1;
    background: #18181b;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    min-height: 100vh;
  }

  .left-panel .brand {
    position: absolute;
    top: 36px;
    left: 40px;
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: #fff;
    letter-spacing: -0.5px;
    z-index: 2;
  }

  .left-panel .brand span { color: #a1a1aa; }

  .left-image-wrap {
    width: 340px;
    height: 340px;
    border-radius: 20px;
    overflow: hidden;
    z-index: 2;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .left-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .left-tagline {
    position: absolute;
    bottom: 40px;
    left: 40px;
    right: 40px;
    z-index: 2;
  }

  .left-tagline p {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    line-height: 1.7;
  }

  /* RIGHT PANEL — Form */
  .right-panel {
    width: 480px;
    flex-shrink: 0;
    background: var(--white);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 52px;
    min-height: 100vh;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 40px;
    border-bottom: 2px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 12px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.2px;
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  /* FORMS */
  .form-section { display: none; }
  .form-section.active { display: block; }

  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .form-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--text);
    box-shadow: 0 0 0 3px rgba(24,24,27,0.06);
  }

  .field input.error { border-color: var(--error); }
  .field input.success { border-color: var(--success); }

  .field-msg {
    font-size: 12px;
    margin-top: 5px;
    min-height: 16px;
  }

  .field-msg.error { color: var(--error); }
  .field-msg.success { color: var(--success); }

  .submit-btn {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.2px;
  }

  .submit-btn:hover { background: var(--accent-hover); }
  .submit-btn:active { transform: scale(0.99); }

  .form-alert {
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 18px;
    display: none;
  }

  .form-alert.error   { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; display: block; }
  .form-alert.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; display: block; }

  /* Background decor */
  .left-panel::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    top: -100px; left: -100px;
  }

  @media (max-width: 820px) {
    body { flex-direction: column; }
    .left-panel { min-height: 260px; }
    .image-drop-zone { width: 200px; height: 200px; }
    .right-panel { width: 100%; padding: 40px 28px; }
  }
</style>
</head>
<body>

<!-- LEFT: Image Panel -->
<div class="left-panel">
  <div class="brand">Dev<span>Track</span></div>

  <!-- ADD YOUR IMAGE: replace "your-image.jpg" with your image filename -->
  <div class="left-image-wrap">
    <img src="login.png" alt="Company Image">
  </div>

  <div class="left-tagline">
    <p>Track developer performance,<br>tasks, and standups — all in one place.</p>
  </div>
</div>

<!-- RIGHT: Auth Forms -->
<div class="right-panel">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <div class="form-section active" id="loginSection">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Enter your credentials to continue.</div>

    <div class="form-alert" id="loginAlert"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@company.com">
      <div class="field-msg" id="loginEmailMsg"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
      <div class="field-msg" id="loginPassMsg"></div>
    </div>

    <button class="submit-btn" onclick="handleLogin()">Login</button>
  </div>

  <!-- SIGNUP -->
  <div class="form-section" id="signupSection">
    <div class="form-title">Create account</div>
    <div class="form-sub">Fill in your details to get started.</div>

    <div class="form-alert" id="signupAlert"></div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="John Doe">
      <div class="field-msg" id="signupNameMsg"></div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@company.com">
      <div class="field-msg" id="signupEmailMsg"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min. 6 characters">
      <div class="field-msg" id="signupPassMsg"></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="signupConfirm" placeholder="Repeat password">
      <div class="field-msg" id="signupConfirmMsg"></div>
    </div>

    <button class="submit-btn" onclick="handleSignup()">Create Account</button>
  </div>

</div>

<script>
  // Tab switch
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
    });
    document.getElementById('loginSection').classList.toggle('active', tab === 'login');
    document.getElementById('signupSection').classList.toggle('active', tab === 'signup');
    clearAlerts();
  }

  function clearAlerts() {
    document.querySelectorAll('.form-alert').forEach(a => { a.className = 'form-alert'; a.textContent = ''; });
    document.querySelectorAll('.field-msg').forEach(m => { m.className = 'field-msg'; m.textContent = ''; });
    document.querySelectorAll('input').forEach(i => { i.classList.remove('error', 'success'); });
  }

  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'field-msg ' + type;
  }

  function setAlert(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'form-alert ' + type;
  }

  // SIGNUP
  function handleSignup() {
    clearAlerts();
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const pass     = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    let valid = true;

    if (!name) {
      setMsg('signupNameMsg', 'Name is required.', 'error');
      document.getElementById('signupName').classList.add('error');
      valid = false;
    }

    if (!email || !email.includes('@')) {
      setMsg('signupEmailMsg', 'Enter a valid email.', 'error');
      document.getElementById('signupEmail').classList.add('error');
      valid = false;
    }

    if (pass.length < 6) {
      setMsg('signupPassMsg', 'Password must be at least 6 characters.', 'error');
      document.getElementById('signupPassword').classList.add('error');
      valid = false;
    }

    if (pass !== confirm) {
      setMsg('signupConfirmMsg', 'Passwords do not match.', 'error');
      document.getElementById('signupConfirm').classList.add('error');
      valid = false;
    }

    if (!valid) return;

    // Save to localStorage
    const users = JSON.parse(localStorage.getItem('devtrack_users') || '[]');
    const exists = users.find(u => u.email === email);
    if (exists) {
      setAlert('signupAlert', 'An account with this email already exists.', 'error');
      return;
    }

    users.push({ name, email, password: pass });
    localStorage.setItem('devtrack_users', JSON.stringify(users));
    setAlert('signupAlert', 'Account created successfully! You can now log in.', 'success');

    setTimeout(() => switchTab('login'), 1500);
  }

  // LOGIN
  function handleLogin() {
    clearAlerts();
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    let valid = true;

    if (!email) {
      setMsg('loginEmailMsg', 'Email is required.', 'error');
      document.getElementById('loginEmail').classList.add('error');
      valid = false;
    }

    if (!pass) {
      setMsg('loginPassMsg', 'Password is required.', 'error');
      document.getElementById('loginPassword').classList.add('error');
      valid = false;
    }

    if (!valid) return;

    const users = JSON.parse(localStorage.getItem('devtrack_users') || '[]');
    const user  = users.find(u => u.email === email);

    if (!user) {
      setAlert('loginAlert', 'No account found with this email.', 'error');
      document.getElementById('loginEmail').classList.add('error');
      return;
    }

    if (user.password !== pass) {
      setAlert('loginAlert', 'Incorrect password. Please try again.', 'error');
      document.getElementById('loginPassword').classList.add('error');
      setMsg('loginPassMsg', 'Password does not match our records.', 'error');
      return;
    }

    // Success
    localStorage.setItem('devtrack_loggedIn', JSON.stringify({ name: user.name, email: user.email }));
    setAlert('loginAlert', 'Login successful! Redirecting...', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
  }
</script>
</body>
</html>
