<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', Arial, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
  }

  /* Left side */
  .left-panel {
    flex: 1;
    background: #18181b;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    min-height: 100vh;
    position: relative;
  }

  .brand {
    position: absolute;
    top: 36px;
    left: 40px;
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: normal;
    color: #fff;
  }

  .brand span { color: #a1a1aa; }

  .left-panel img {
    width: 340px;
    height: 340px;
    object-fit: cover;
    border-radius: 20px;
  }

  .left-panel p {
    position: absolute;
    bottom: 40px;
    left: 40px;
    right: 40px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    line-height: 1.7;
  }

  /* Right side */
  .right-panel {
    width: 460px;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 48px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 2px solid #e4e4e7;
    margin-bottom: 32px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    color: #71717a;
  }

  .tab-btn.active {
    color: #18181b;
    border-bottom-color: #18181b;
  }

  /* Form sections */
  .form-section { display: none; }
  .form-section.active { display: block; }

  h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: normal;
    color: #18181b;
    margin-bottom: 6px;
  }

  .sub {
    font-size: 13px;
    color: #71717a;
    margin-bottom: 28px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #71717a;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input {
    width: 100%;
    padding: 11px 13px;
    font-size: 14px;
    border: 1px solid #e4e4e7;
    border-radius: 8px;
    outline: none;
    background: #fafaf9;
  }

  .field input:focus { border-color: #18181b; }

  .msg { font-size: 12px; margin-top: 4px; color: #dc2626; }

  .alert {
    padding: 11px 13px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
  }
  .alert.error   { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .alert.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

  .submit-btn {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: #18181b;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .submit-btn:hover { background: #3f3f46; }
</style>
</head>
<body>

<!-- Left Panel -->
<div class="left-panel">
  <div class="brand">Dev<span>Track</span></div>
  <img src="login.png" alt="Company Image">
  <p>Track developer performance,<br>tasks, and standups — all in one place.</p>
</div>

<!-- Right Panel -->
<div class="right-panel">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- Login Form -->
  <div class="form-section active" id="loginSection">
    <h2>Welcome back</h2>
    <p class="sub">Enter your credentials to continue.</p>

    <div class="alert" id="loginAlert"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@company.com">
      <div class="msg" id="loginEmailMsg"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
      <div class="msg" id="loginPassMsg"></div>
    </div>

    <button class="submit-btn" onclick="handleLogin()">Login</button>
  </div>

  <!-- Signup Form -->
  <div class="form-section" id="signupSection">
    <h2>Create account</h2>
    <p class="sub">Fill in your details to get started.</p>

    <div class="alert" id="signupAlert"></div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your full name">
      <div class="msg" id="signupNameMsg"></div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@company.com">
      <div class="msg" id="signupEmailMsg"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min. 6 characters">
      <div class="msg" id="signupPassMsg"></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="signupConfirm" placeholder="Repeat password">
      <div class="msg" id="signupConfirmMsg"></div>
    </div>

    <button class="submit-btn" onclick="handleSignup()">Create Account</button>
  </div>

</div>

<script>
  // Switch between Login and Signup tabs
  function switchTab(tab) {
    if (tab === 'login') {
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.remove('active');
      document.getElementById('loginSection').classList.add('active');
      document.getElementById('signupSection').classList.remove('active');
    } else {
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
      document.querySelectorAll('.tab-btn')[0].classList.remove('active');
      document.getElementById('signupSection').classList.add('active');
      document.getElementById('loginSection').classList.remove('active');
    }
  }

  // Show error message under a field
  function showMsg(id, text) {
    document.getElementById(id).textContent = text;
  }

  // Clear all messages
  function clearMsgs() {
    document.querySelectorAll('.msg').forEach(function(m) { m.textContent = ''; });
    document.querySelectorAll('.alert').forEach(function(a) { a.className = 'alert'; a.textContent = ''; });
  }

  // Signup
  function handleSignup() {
    clearMsgs();

    var name    = document.getElementById('signupName').value.trim();
    var email   = document.getElementById('signupEmail').value.trim();
    var pass    = document.getElementById('signupPassword').value;
    var confirm = document.getElementById('signupConfirm').value;
    var valid   = true;

    if (name === '') {
      showMsg('signupNameMsg', 'Name is required.');
      valid = false;
    }
    if (email === '' || email.indexOf('@') === -1) {
      showMsg('signupEmailMsg', 'Enter a valid email.');
      valid = false;
    }
    if (pass.length < 6) {
      showMsg('signupPassMsg', 'Password must be at least 6 characters.');
      valid = false;
    }
    if (pass !== confirm) {
      showMsg('signupConfirmMsg', 'Passwords do not match.');
      valid = false;
    }
    if (!valid) return;

    // Save user to localStorage
    var users = JSON.parse(localStorage.getItem('devtrack_users') || '[]');
    for (var i = 0; i < users.length; i++) {
      if (users[i].email === email) {
        var a = document.getElementById('signupAlert');
        a.textContent = 'Email already registered. Please login.';
        a.className = 'alert error';
        return;
      }
    }

    users.push({ name: name, email: email, password: pass });
    localStorage.setItem('devtrack_users', JSON.stringify(users));

    var a = document.getElementById('signupAlert');
    a.textContent = 'Account created! You can now login.';
    a.className = 'alert success';

    setTimeout(function() { switchTab('login'); }, 1500);
  }

  // Login
  function handleLogin() {
    clearMsgs();

    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPassword').value;
    var valid = true;

    if (email === '') {
      showMsg('loginEmailMsg', 'Email is required.');
      valid = false;
    }
    if (pass === '') {
      showMsg('loginPassMsg', 'Password is required.');
      valid = false;
    }
    if (!valid) return;

    var users = JSON.parse(localStorage.getItem('devtrack_users') || '[]');
    var found = null;
    for (var i = 0; i < users.length; i++) {
      if (users[i].email === email) {
        found = users[i];
        break;
      }
    }

    if (found === null) {
      var a = document.getElementById('loginAlert');
      a.textContent = 'No account found with this email.';
      a.className = 'alert error';
      return;
    }

    if (found.password !== pass) {
      var a = document.getElementById('loginAlert');
      a.textContent = 'Incorrect password. Please try again.';
      a.className = 'alert error';
      return;
    }

    // Login success
    localStorage.setItem('devtrack_loggedIn', JSON.stringify({ name: found.name, email: found.email }));
    var a = document.getElementById('loginAlert');
    a.textContent = 'Login successful! Redirecting...';
    a.className = 'alert success';

    setTimeout(function() { window.location.href = 'dashboard.html'; }, 1200);
  }
</script>
</body>
</html>
